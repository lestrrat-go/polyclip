name: Fuzz

on:
  schedule:
    - cron: '0 3 * * 3' # Weekly on Wednesday at 03:00 UTC
  workflow_dispatch:
    inputs:
      fuzz-time:
        description: 'Duration per fuzz target (e.g. 5m, 10m)'
        required: false
        default: '5m'

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [FuzzUnion, FuzzIntersect, FuzzDifference, FuzzXor]
    name: "Fuzz ${{ matrix.target }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: false
      - name: Restore fuzz cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-${{ matrix.target }}-
      - name: Run fuzz target
        env:
          FUZZTIME: ${{ github.event.inputs.fuzz-time || '5m' }}
        run: go test . -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime "$FUZZTIME"
      - name: Upload failing corpus
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-${{ matrix.target }}-corpus
          path: testdata/fuzz/
          if-no-files-found: ignore
